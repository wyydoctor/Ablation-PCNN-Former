seed: 42
batch_size: 16
epochs: 100
lr: 0.001
weight_decay: 0.0001

data:
  csv_path: "data/regression/data.csv"
  # 归一化参数（根据数据集统计值填写，示例值）
  norm_params:
    voltage: [200.0, 1600.0]    # [min, max]
    pw: [250.0, 1000.0]        # [min, max]
    pd: [2000.0, 8000.0]       # [min, max]
    electrode_spacing: [10.0, 50.0] # [min, max]

loss:
  e_ire: 478.0
  electrode_radius: 0.05
  max_ablation_area: 70.0
  w_physics: 0.3
  lambda_: 0.1
  k_sigmoid: 100.0
  # 消融平台公式参数（解硬编码）
  s_sat_coeff: 12.5
  s_sat_bias: -22.5

model:
  input_dim: 4          # 新增电极间距维度：[电压, 脉宽, PD, 电极间距]
  hidden_dim: 64
  output_dim: 1

# 逆优化配置
inverse_optim:
  method: "L-BFGS-B"
  maxiter: 1000
  ftol: 1e-6
  fallback_method: "SLSQP"  # 优化失败备用策略